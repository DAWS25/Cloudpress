---
AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudPress - Static SPA hosting using S3 and CloudFront

Parameters:
  ProjectName:
    Type: String
    Default: cloudpress
  Environment:
    Type: String
    Default: dev

Resources:
  StaticSiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${ProjectName}-${Environment}-frontend'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

Outputs:
  BucketName:
    Description: S3 bucket name
    Value: !Ref StaticSiteBucket
    Export:
      Name: !Sub '${ProjectName}-${Environment}-bucket-name'
  BucketArn:
    Description: ARN of the S3 bucket
    Value: !GetAtt StaticSiteBucket.Arn
    Export:
      Name: !Sub '${ProjectName}-${Environment}-bucket-arn'
  BucketRegionalDomainName:
    Description: Regional domain name of the bucket
    Value: !GetAtt StaticSiteBucket.RegionalDomainName
    Export:
      Name: !Sub '${ProjectName}-${Environment}-bucket-domain'
