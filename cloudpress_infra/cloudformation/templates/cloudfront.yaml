
---
AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudPress - Static SPA hosting using S3 and CloudFront

Parameters:
  ProjectName:
    Type: String
    
  Environment:
    Type: String

  ResourcePrefix:
    Type: String
    
#   DomainName:
#     Type: String
#     Default: ''
#     Description: Optional custom domain (leave empty if not used)

# Conditions:
#   UseCustomDomain: !Not [!Equals [!Ref DomainName, '']]

Resources:
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${ProjectName}-${Environment}-oac'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !ImportValue
              Fn::Sub: '${ProjectName}-${Environment}-${ResourcePrefix}-bucket-domain'
            S3OriginConfig: {}
            OriginAccessControlId: !Ref CloudFrontOAC
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          ForwardedValues:
            QueryString: false
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
        PriceClass: PriceClass_100
  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !ImportValue
        Fn::Sub: '${ProjectName}-${Environment}-${ResourcePrefix}-bucket-name'
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub
              - '${BucketArn}/*'
              - BucketArn: !ImportValue
                  Fn::Sub: '${ProjectName}-${Environment}-${ResourcePrefix}-bucket-arn'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub |-
                  arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}

Outputs:
  CloudFrontDomainName:
    Description: CloudFront distribution domain
    Value: !GetAtt CloudFrontDistribution.DomainName
    Export:
      Name: !Sub "${ProjectName}-${Environment}-cloudfront-domain-name"
