AWSTemplateFormatVersion: "2010-09-09"
Description: >
  CloudPress - Binding entre API Gateway HTTP e Lambda de upload markdown

Parameters:
  ProjectName:
    Type: String

  Environment:
    Type: String

Resources:
  UploadApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId:
        Fn::ImportValue:
          Fn::Sub: "${ProjectName}-${Environment}-upload-api-id"
      IntegrationType: AWS_PROXY
      IntegrationUri:
        Fn::ImportValue:
          Fn::Sub: "${ProjectName}-${Environment}-upload-lambda-alias-arn"
      PayloadFormatVersion: "2.0"

  UploadApiRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId:
        Fn::ImportValue:
          Fn::Sub: "${ProjectName}-${Environment}-upload-api-id"
      RouteKey: "POST /upload"
      AuthorizationType: JWT
      AuthorizerId:
        Fn::ImportValue:
          Fn::Sub: "${ProjectName}-${Environment}-upload-authorizer-id"
      Target: !Sub "integrations/${UploadApiIntegration}"

  PermissionForApiGatewayInvoke:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName:
        Fn::ImportValue:
          Fn::Sub: "${ProjectName}-${Environment}-upload-lambda-alias-arn"
      Principal: apigateway.amazonaws.com
      SourceArn:
        Fn::Sub:
          - "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiId}/*/*/*"
          - ApiId:
              Fn::ImportValue:
                Fn::Sub: "${ProjectName}-${Environment}-upload-api-id"
