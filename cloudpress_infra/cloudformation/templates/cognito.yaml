AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Cloudpress - Amazon Cognito User Pool for authentication

Parameters:
  ProjectName:
    Type: String
    Default: cloudpress
    Description: Project name used for resource naming

  Environment:
    Type: String
    Description: Deployment environment (dev, stage, prod)

Resources:
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "${ProjectName}-${Environment}-user-pool"
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      Schema:
        - Name: email
          Required: true
          Mutable: true
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "${ProjectName}-${Environment}-frontend-client"
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: false
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - email
        - openid
        - profile
      AllowedOAuthFlowsUserPoolClient: true
      CallbackURLs:
        - http://d3bkqhfl8c7rka.cloudfront.net
        - https://d3bkqhfl8c7rka.cloudfront.net
      LogoutURLs:
        - http://d3bkqhfl8c7rka.cloudfront.net
        - https://d3bkqhfl8c7rka.cloudfront.net
      SupportedIdentityProviders:
        - COGNITO
      PreventUserExistenceErrors: ENABLED

  CognitoUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub "${ProjectName}-${Environment}-auth"
      UserPoolId: !Ref CognitoUserPool

Outputs:
  CognitoUserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref CognitoUserPool
    Export:
      Name: !Sub "${ProjectName}-${Environment}-cognito-user-pool-id"

  CognitoUserPoolClientId:
    Description: Cognito User Pool App Client ID
    Value: !Ref CognitoUserPoolClient
    Export:
      Name: !Sub "${ProjectName}-${Environment}-cognito-user-pool-client-id"
    
  CognitoDomain:
    Description: Cognito Hosted UI domain
    Value: !Sub "https://${ProjectName}-${Environment}-auth.auth.${AWS::Region}.amazoncognito.com"
    Export:
      Name: !Sub "${ProjectName}-${Environment}-cognito-domain"
